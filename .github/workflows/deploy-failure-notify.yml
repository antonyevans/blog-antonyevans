name: Deploy Failure Notifications

on:
  workflow_run:
    workflows:
      - Cloudflare Pages Auto Deploy
    types:
      - completed

permissions:
  contents: read
  issues: write

jobs:
  notify:
    if: github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Open or update failure issue
        if: github.event.workflow_run.conclusion == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'Production deploy failure';
            const run = context.payload.workflow_run;
            const body = [
              'The production deploy workflow failed.',
              '',
              `- Workflow: ${run.name}`,
              `- Branch: ${run.head_branch}`,
              `- Commit: ${run.head_sha}`,
              `- Run: ${run.html_url}`,
              `- Triggered at: ${run.created_at}`,
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'deploy-failure',
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['deploy-failure'],
              });
            }

      - name: Close failure issue after successful deploy
        if: github.event.workflow_run.conclusion == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'Production deploy failure';
            const run = context.payload.workflow_run;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'deploy-failure',
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title);
            if (!existing) return;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: existing.number,
              body: `Production deploy recovered successfully.\n\n- Run: ${run.html_url}\n- Commit: ${run.head_sha}`,
            });

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: existing.number,
              state: 'closed',
            });
